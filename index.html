<!DOCTYPE html>
<html lang="en">
<head>

  apiKey: "AIzaSyBWjBUB1OjRXRghtMZ6ZMWQ1Kwk8aIjCoQ",
  authDomain: "mxchronicles-8e7b1.firebaseapp.com",

<style>
.issue-toggle {
  margin: 10px 0 20px;
  font-family: inherit;
}

.issue-toggle select {
  padding: 6px 10px;
  font-size: 14px;
}
</style>

</head>

<body class="home-bg">

<header class="top-bar">
  <div class="masthead">MX CHRONICLES</div>
  <nav class="top-nav">
    <a href="index.html" class="active">HOME</a>
    <a href="articles.html">ARTICLES</a>
    <a href="about.html">ABOUT</a>
    <a href="staff.html">STAFF PORTAL</a>
  </nav>
</header>

<main class="home-container">

  <!-- LEFT PANEL -->
  <aside class="issue-left">
    <div class="issue-number" id="issue-number">1</div>
    <h1 class="issue-title" id="issue-title">RESURGENCE</h1>
    <p class="issue-description" id="issue-description">This issue focuses on...</p>
  </aside>

  <!-- RIGHT SIDE -->
  <section class="issue-articles">

    <!-- ISSUE TOGGLE -->
    <div class="issue-toggle">
      <label for="issue-select">Select Issue:</label>
      <select id="issue-select"></select>
    </div>

    <!-- ARTICLES -->
    <div id="home-articles"></div>

  </section>
</main>

<script>
function renderHomePage() {
  const container = document.getElementById("home-articles");
  const select = document.getElementById("issue-select");

  if (!container || !select) return;

  let allArticles = {};
  let currentIssue = null;

  articlesRef.on("value", snap => {
    allArticles = snap.val() || {};

    const issues = [...new Set(
      Object.values(allArticles).map(a => a.issue).filter(Boolean)
    )].sort((a,b) => a-b);

    select.innerHTML = issues.map(i => `<option value="${i}">Issue ${i}</option>`).join("");

    if (!currentIssue) {
      currentIssue = issues[issues.length - 1];
      select.value = currentIssue;
    }

    renderIssue(currentIssue);
  });

  select.addEventListener("change", () => {
    currentIssue = parseInt(select.value);
    renderIssue(currentIssue);
  });

  function renderIssue(issueNum) {
    const filtered = Object.entries(allArticles)
      .map(([id, a]) => ({ id, ...a }))
      .filter(a => a.issue == issueNum);

    container.innerHTML = "";

    document.getElementById("issue-number").textContent = issueNum;
    document.getElementById("issue-title").textContent = "";
    document.getElementById("issue-description").textContent = "";

    filtered.forEach(a => {
      const article = document.createElement("article");
      article.className = "article-home-tile";

      article.onclick = () => openArticle(a.id);

      article.innerHTML = `
        ${a.image ? `<img src="${a.image}" alt="${a.title}">` : ""}
        <h2>${a.title.toUpperCase()}</h2>
        <div class="meta">${a.author} · ${a.date}</div>
        <p>${a.content.slice(0,120)}...</p>
      `;

      container.appendChild(article);
    });
  }
}

// Redirect
function openArticle(id) {
  localStorage.setItem("currentArticle", id);
  window.location.href = "article.html";
}

renderHomePage();
</script>

</body>
</html>
