<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MX Chronicles</title>

<link rel="stylesheet" href="style.css">
<script src="articles.js" defer></script>
</head>

<body onload="renderHomePage()" class="home-bg">

<!-- RED NAV BAR -->
<header class="top-bar">
  <div class="masthead">MX CHRONICLES</div>
  <nav class="top-nav">
    <a href="index.html" class="active">HOME</a>
    <a href="articles.html">ARTICLES</a>
    <a href="about.html">ABOUT</a>
    <a href="staff.html">STAFF PORTAL</a>
  </nav>
</header>

<!-- THREE REGION SPLIT -->
<main class="home-container">

  <!-- LEFT PANEL -->
  <aside class="issue-left">
    <div class="issue-number" id="issue-number">1</div>
    <h1 class="issue-title" id="issue-title">
      RESURGENCE
    </h1>
    <p class="issue-description" id="issue-description">
      This issue focuses on...
    </p>
  </aside>

  <!-- RIGHT SIDE -->
  <section class="issue-articles" id="home-articles">
  </section>

</main>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBWjBUB1OjRXRghtMZ6ZMWQ1Kwk8aIjCoQ",
  authDomain: "mxchronicles-8e7b1.firebaseapp.com",
  databaseURL: "https://mxchronicles-8e7b1-default-rtdb.firebaseio.com",
  projectId: "mxchronicles-8e7b1",
  storageBucket: "mxchronicles-8e7b1.firebasestorage.app",
  messagingSenderId: "855683773579",
  appId: "1:855683773579:web:199aba0a59a5e09701908e"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
</script>

<script>
function renderHomePage() {

  const container = document.getElementById("home-articles");
  if (!container) return;

  db.ref("articles").once("value").then(snapshot => {

    const articlesData = snapshot.val();
    if (!articlesData) {
      container.innerHTML = "<p>No articles yet.</p>";
      return;
    }

    container.innerHTML = "";

    // Convert Firebase object → array
    const articles = Object.entries(articlesData).map(([id, data]) => ({
      id,
      ...data
    }));

    // Group by issue
    const issues = {};
    articles.forEach(a => {
      const issueNum = a.issue || 1;
      if (!issues[issueNum]) issues[issueNum] = [];
      issues[issueNum].push(a);
    });

    const issueNumbers = Object.keys(issues).sort((a,b)=>b-a);
    const currentIssue = issueNumbers[0] || 1;

    document.getElementById("issue-number").textContent = currentIssue;

    const currentArticles = issues[currentIssue] || [];

    currentArticles.forEach((a, index) => {

      const article = document.createElement("article");

      // Your irregular layout logic preserved
      if (index % 4 === 0) {
        article.className = "article-wide";
      } else if (index % 3 === 0) {
        article.className = "article-tall";
      } else {
        article.className = "article-standard";
      }

      article.onclick = () => {
        window.location.href = `article.html?id=${a.id}`;
      };

      article.innerHTML = `
        ${a.image ? `<img src="${a.image}" alt="${a.title}">` : ""}
        <h2>${a.title.toUpperCase()}</h2>
        <div class="meta">${a.author} · ${a.date}</div>
        <p>${a.content ? a.content.slice(0,120) : ""}...</p>
      `;

      container.appendChild(article);
    });

  });
}
</script>

</body>
</html>
