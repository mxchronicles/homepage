<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MX Chronicles</title>

<link rel="stylesheet" href="style.css">
<script src="articles.js" defer></script>
</head>

<body onload="renderHomePage()">

<!-- RED NAV BAR -->
<header class="top-bar">
  <div class="masthead">MX CHRONICLES</div>
  <nav class="top-nav">
    <a href="index.html" class="active">HOME</a>
    <a href="articles.html">ARTICLES</a>
    <a href="about.html">ABOUT</a>
    <a href="staff.html">STAFF PORTAL</a>
  </nav>
</header>

<!-- THREE REGION SPLIT -->
<main class="home-container">

  <!-- LEFT PANEL -->
  <aside class="issue-left">
    <div class="issue-number" id="issue-number">1</div>
    <h1 class="issue-title" id="issue-title">
      RENAISSANCE
    </h1>
    <p class="issue-description" id="issue-description">
      A reawakening of classical learning, art, and humanism across Europe.
    </p>
  </aside>

  <!-- RIGHT SIDE (MIDDLE + RIGHT COMBINED) -->
  <section class="issue-articles" id="home-articles">
  </section>

</main>

<script>
function renderHomePage() {

  const container = document.getElementById("home-articles");
  if (!container) return;

  const articles = JSON.parse(localStorage.getItem("articles")) || {};
  container.innerHTML = "";

  // Group by issue
  const issues = {};
  Object.values(articles).forEach(a => {
    if (!issues[a.issue]) issues[a.issue] = [];
    issues[a.issue].push(a);
  });

  const issueNumbers = Object.keys(issues).sort((a,b)=>b-a);
  const currentIssue = issueNumbers[0] || 1;

  document.getElementById("issue-number").textContent = currentIssue;

  const currentArticles = issues[currentIssue] || [];

  currentArticles.forEach((a, index) => {

    const article = document.createElement("article");

    // Irregular layout logic
    if (index % 4 === 0) {
      article.className = "article-wide";
    } else if (index % 3 === 0) {
      article.className = "article-tall";
    } else {
      article.className = "article-standard";
    }

    article.onclick = () => openArticle(a.id);

    article.innerHTML = `
      ${a.image ? `<img src="${a.image}" alt="${a.title}">` : ""}
      <h2>${a.title.toUpperCase()}</h2>
      <div class="meta">${a.author} · ${a.date}</div>
      <p>${a.content.slice(0,120)}...</p>
    `;

    container.appendChild(article);
  });
}
</script>

</body>
</html>
