<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MX Chronicles</title>
<link rel="stylesheet" href="style.css">
<script src="articles.js" defer></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBWjBUB1OjRXRghtMZ6ZMWQ1Kwk8aIjCoQ",
  authDomain: "mxchronicles-8e7b1.firebaseapp.com",
  databaseURL: "https://mxchronicles-8e7b1-default-rtdb.firebaseio.com",
  projectId: "mxchronicles-8e7b1",
  storageBucket: "mxchronicles-8e7b1.firebasestorage.app",
  messagingSenderId: "855683773579",
  appId: "1:855683773579:web:199aba0a59a5e09701908e"
};

// SAFE INIT
if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}

var db = firebase.database();
const articlesRef = db.ref("articles");
const issuesRef = db.ref("issues");
</script>

<style>
.issue-toggle {
  margin: 10px 0 20px;
  font-family: inherit;
}

.issue-toggle select {
  padding: 6px 10px;
  font-size: 14px;
}
</style>

</head>

<body class="home-bg">

<header class="top-bar">
  <div class="masthead">MX CHRONICLES</div>
  <nav class="top-nav">
    <a href="index.html" class="active">HOME</a>
    <a href="articles.html">ARTICLES</a>
    <a href="about.html">ABOUT</a>
    <a href="staff.html">STAFF PORTAL</a>
  </nav>
</header>

<main class="home-container">

  <!-- LEFT PANEL -->
  <aside class="issue-left">
    <div class="issue-number" id="issue-number">1</div>
    <h1 class="issue-title" id="issue-title">RESURGENCE</h1>
    <p class="issue-description" id="issue-description">This issue focuses on...</p>
  </aside>

  <!-- RIGHT SIDE -->
  <section class="issue-articles">

    <!-- ISSUE TOGGLE -->
    <div class="issue-toggle">
      <label for="issue-select">Select Issue:</label>
      <select id="issue-select"></select>
    </div>

    <!-- ARTICLES -->
    <div id="home-articles"></div>

  </section>
</main>

<script>
function renderHomePage() {
  const container = document.getElementById("home-articles");
  const select = document.getElementById("issue-select");

  if (!container || !select) return;

  let allArticles = {};
  let allIssues = {};
  let currentIssue = null;

  let issuesLoaded = false;
  let articlesLoaded = false;

  // LOAD ISSUES (PRIMARY SOURCE)
  issuesRef.on("value", snap => {
    allIssues = snap.val() || {};

    const issueNumbers = Object.keys(allIssues)
      .map(n => parseInt(n))
      .sort((a, b) => a - b);

    // Populate dropdown
    select.innerHTML = issueNumbers.map(i =>
      `<option value="${i}">Issue ${i}</option>`
    ).join("");

    // Default to latest issue
    if (!currentIssue && issueNumbers.length > 0) {
      currentIssue = issueNumbers[issueNumbers.length - 1];
      select.value = currentIssue;
    }

    issuesLoaded = true;
    tryRender();
  });

  // LOAD ARTICLES
  articlesRef.on("value", snap => {
    allArticles = snap.val() || {};
    articlesLoaded = true;
    tryRender();
  });

  // ISSUE TOGGLE CHANGE
  select.addEventListener("change", () => {
    currentIssue = parseInt(select.value);
    renderIssue(currentIssue);
  });

  // ENSURE BOTH LOADED BEFORE RENDER
  function tryRender() {
    if (issuesLoaded && articlesLoaded) {
      renderIssue(currentIssue);
    }
  }

  // RENDER FUNCTION
  function renderIssue(issueNum) {
    if (!issueNum) return;

    const issue = allIssues[issueNum] || {};

    document.getElementById("issue-number").textContent =
      issue.number || issueNum;

    document.getElementById("issue-title").textContent =
      issue.title || "";

    document.getElementById("issue-description").textContent =
      issue.description || "";

    const filtered = Object.entries(allArticles)
      .map(([id, a]) => ({ id, ...a }))
      .filter(a => a.issue == issueNum);

    container.innerHTML = "";

    if (filtered.length === 0) {
      container.innerHTML = "<p>No articles in this issue yet.</p>";
      return;
    }

    filtered.forEach(a => {
      const article = document.createElement("article");
      article.className = "article-home-tile";

      article.onclick = () => openArticle(a.id);

      article.innerHTML = `
        ${a.image ? `<img src="${a.image}" alt="${a.title}">` : ""}
        <h2>${a.title.toUpperCase()}</h2>
        <div class="meta">${a.author} · ${a.date}</div>
        <p>${a.content.slice(0,120)}...</p>
      `;

      container.appendChild(article);
    });
  }
}

// REDIRECT
function openArticle(id) {
  localStorage.setItem("currentArticle", id);
  window.location.href = "article.html";
}

// RUN
renderHomePage();
</script>

</body>
</html>
