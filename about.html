<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MX Chronicles • About</title>
<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBWjBUB1OjRXRghtMZ6ZMWQ1Kwk8aIjCoQ",
  authDomain: "mxchronicles-8e7b1.firebaseapp.com",
  databaseURL: "https://mxchronicles-8e7b1-default-rtdb.firebaseio.com",
  projectId: "mxchronicles-8e7b1",
  storageBucket: "mxchronicles-8e7b1.firebasestorage.app",
  messagingSenderId: "855683773579",
  appId: "1:855683773579:web:199aba0a59a5e09701908e"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const staffRef = db.ref("staff");
</script>
</head>

<body>

<header class="top-bar">
  <div class="masthead">MX CHRONICLES</div>
</header>

<main class="container">
<section class="panel">
<h2>About MX Chronicles</h2>
<p>MX Chronicles is a student-run publication dedicated to journalism, commentary, and storytelling.</p>
</section>

<section class="panel">
<h2>Our Staff</h2>
<ul id="staff-list" class="styled-list"></ul>
</section>
</main>

<script>
staffRef.on("value", snapshot=>{
  const data = snapshot.val() || [];
  const list = document.getElementById("staff-list");
  list.innerHTML="";
  data.forEach(name=>{
    const li=document.createElement("li");
    li.textContent=name;
    list.appendChild(li);
  });
});
</script>

</body>
</html>
