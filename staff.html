<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Portal</title>
<link rel="stylesheet" href="style.css">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBWjBUB1OjRXRghtMZ6ZMWQ1Kwk8aIjCoQ",
  authDomain: "mxchronicles-8e7b1.firebaseapp.com",
  databaseURL: "https://mxchronicles-8e7b1-default-rtdb.firebaseio.com",
  projectId: "mxchronicles-8e7b1",
  storageBucket: "mxchronicles-8e7b1.firebasestorage.app",
  messagingSenderId: "855683773579",
  appId: "1:855683773579:web:199aba0a59a5e09701908e"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const articlesRef = db.ref("articles");
const staffRef = db.ref("staff");
</script>
</head>

<body>

<h1>Staff Portal</h1>

<!-- ================= STAFF MANAGEMENT ================= -->
<section>
<h2>Staff Members</h2>
<div id="staff-list"></div>
<input type="text" id="new-staff" placeholder="New staff name">
<button onclick="addStaff()">Add Staff</button>
</section>

<hr>

<!-- ================= ADD ARTICLE ================= -->
<section>
<h2>Add Article</h2>
<form id="new-article-form">
<input type="text" name="title" placeholder="Title" required><br>
<input type="text" name="author" placeholder="Author" required><br>
<input type="date" name="date" required><br>
<textarea name="content" placeholder="Content" required></textarea><br>
<button type="submit">Add Article</button>
</form>
</section>

<hr>

<!-- ================= MANAGE ARTICLES ================= -->
<section>
<h2>Manage Articles</h2>
<div id="staff-articles"></div>
</section>

<script>

// ================= STAFF =================
function renderStaff() {
  staffRef.on("value", snapshot => {
    const data = snapshot.val() || [];
    const container = document.getElementById("staff-list");
    container.innerHTML = "";

    data.forEach((name, index) => {
      const div = document.createElement("div");
      div.innerHTML = `
        ${name}
        <button onclick="removeStaff(${index})">Remove</button>
      `;
      container.appendChild(div);
    });
  });
}

function addStaff() {
  const input = document.getElementById("new-staff");
  if (!input.value.trim()) return;

  staffRef.once("value").then(snapshot => {
    let staff = snapshot.val() || [];
    staff.push(input.value.trim());
    staffRef.set(staff);
    input.value = "";
  });
}

function removeStaff(index) {
  staffRef.once("value").then(snapshot => {
    let staff = snapshot.val() || [];
    staff.splice(index, 1);
    staffRef.set(staff);
  });
}

// ================= ADD ARTICLE =================
document.getElementById("new-article-form").addEventListener("submit", function(e){
  e.preventDefault();

  const form = e.target;
  const newArticleRef = articlesRef.push();

  newArticleRef.set({
    title: form.title.value,
    author: form.author.value,
    date: form.date.value,
    content: form.content.value
  });

  form.reset();
});

// ================= MANAGE ARTICLES =================
function renderArticles() {
  articlesRef.on("value", snapshot => {
    const data = snapshot.val();
    const container = document.getElementById("staff-articles");
    container.innerHTML = "";

    if (!data) {
      container.innerHTML = "<p>No articles yet.</p>";
      return;
    }

    Object.entries(data).forEach(([id, article]) => {
      const div = document.createElement("div");
      div.innerHTML = `
        <strong>${article.title}</strong>
        <button onclick="deleteArticle('${id}')">Delete</button>
        <button onclick="editArticle('${id}')">Edit</button>
        <hr>
      `;
      container.appendChild(div);
    });
  });
}

function deleteArticle(id) {
  articlesRef.child(id).remove();
}

function editArticle(id) {
  const newTitle = prompt("New title:");
  if (!newTitle) return;

  articlesRef.child(id).update({
    title: newTitle
  });
}

// ================= INIT =================
renderStaff();
renderArticles();

</script>
</body>
</html>
