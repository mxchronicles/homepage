<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MX Chronicles · Staff Portal</title>
<link rel="stylesheet" href="style.css">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBWjBUB1OjRXRghtMZ6ZMWQ1Kwk8aIjCoQ",
  authDomain: "mxchronicles-8e7b1.firebaseapp.com",
  databaseURL: "https://mxchronicles-8e7b1-default-rtdb.firebaseio.com",
  projectId: "mxchronicles-8e7b1",
  storageBucket: "mxchronicles-8e7b1.firebasestorage.app",
  messagingSenderId: "855683773579",
  appId: "1:855683773579:web:199aba0a59a5e09701908e"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
</script>

<script src="articles.js" defer></script>

</head>
<body>

<!-- PASSWORD OVERLAY -->
<div id="password-overlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#000a;display:flex;justify-content:center;align-items:center;z-index:999;">
  <div style="background:#fbf8f2;padding:2rem;border:5px solid #8b0000;text-align:center;border-radius:10px;">
    <h2>Enter Staff Portal Password</h2>
    <input type="password" id="staff-password" placeholder="Password" style="padding:0.5rem;width:80%;">
    <br>
    <button onclick="checkPassword()" style="margin-top:1rem;padding:0.5rem 1rem;">Enter</button>
    <p id="password-error" style="color:red;display:none;margin-top:0.5rem;">Incorrect password</p>
  </div>
</div>

<main id="staff-portal" style="display:none;padding:2rem;">

<header class="top-bar">
  <div class="masthead">MX CHRONICLES</div>
</header>

<!-- ================= STAFF MANAGEMENT ================= -->
<section style="margin-bottom:2rem;">
  <h2>Staff Members</h2>
  <div id="staff-list" style="margin-bottom:1rem;"></div>
  <input type="text" id="new-staff" placeholder="New staff name" style="padding:0.5rem;">
  <button onclick="addStaff()">Add Staff</button>
</section>

<hr style="margin:2rem 0;">

<!-- ================= ADD NEW ARTICLE ================= -->
<section style="margin-bottom:2rem;">
  <h2>Add New Article</h2>
  <form id="new-article-form">
    <input type="text" name="title" placeholder="Title" required style="width:100%;margin-bottom:0.5rem;">
    <input type="text" name="author" placeholder="Author" required style="width:100%;margin-bottom:0.5rem;">
    <input type="date" name="date" required style="margin-bottom:0.5rem;">
    <input type="number" name="issue" placeholder="Issue #" required style="width:100px;margin-bottom:0.5rem;">
    <textarea name="content" placeholder="Content" required style="width:100%;height:120px;margin-bottom:0.5rem;"></textarea>
    <input type="text" name="image" placeholder="Image URL (optional)" style="width:100%;margin-bottom:0.5rem;">
    <button type="submit">Add Article</button>
  </form>
</section>

<hr style="margin:2rem 0;">

<!-- ================= EDIT ARTICLES ================= -->
<section>
  <h2>Edit Existing Articles</h2>
  <div class="article-grid" id="staff-articles"></div>
</section>

</main>

<script>

// ================= PASSWORD =================
function checkPassword(){
  const pw = document.getElementById('staff-password').value;
  if(pw === "26MXChronicles"){
    document.getElementById('password-overlay').style.display = 'none';
    document.getElementById('staff-portal').style.display = 'block';
    renderStaffPortal();
  } else {
    document.getElementById('password-error').style.display = 'block';
  }
}

// ================= STAFF =================
async function getStaff(){
  const snap = await db.ref("staff").get();
  return snap.exists() ? snap.val() : [];
}

async function saveStaff(staff){
  await db.ref("staff").set(staff);
}

async function renderStaffList(){
  const staff = await getStaff();
  const container = document.getElementById('staff-list');
  container.innerHTML = '';
  staff.forEach((name,i)=>{
    const div = document.createElement('div');
    div.innerHTML = `${name} <button onclick="removeStaff(${i})">Remove</button>`;
    container.appendChild(div);
  });
}

async function addStaff(){
  const input = document.getElementById('new-staff');
  if(input.value.trim()){
    let staff = await getStaff();
    staff.push(input.value.trim());
    await saveStaff(staff);
    input.value = '';
    renderStaffList();
  }
}

async function removeStaff(i){
  let staff = await getStaff();
  staff.splice(i,1);
  await saveStaff(staff);
  renderStaffList();
}

// ================= ARTICLES =================
async function renderStaffArticles(){
  const articles = await getArticles();
  const grid = document.getElementById('staff-articles');
  grid.innerHTML = '';

  Object.entries(articles).forEach(([id,a])=>{
    const div = document.createElement('div');
    div.className = 'article-card';
    div.innerHTML = `
      <form onsubmit="saveArticle(event,'${id}')">
        <h3>Edit: ${a.title}</h3>
        <input type="text" name="title" value="${a.title}" style="width:100%;margin-bottom:0.3rem;">
        <input type="text" name="author" value="${a.author}" style="width:100%;margin-bottom:0.3rem;">
        <input type="date" name="date" value="${a.date}" style="margin-bottom:0.3rem;">
        <input type="number" name="issue" value="${a.issue}" style="width:80px;margin-bottom:0.3rem;">
        <textarea name="content" style="width:100%;height:100px;margin-bottom:0.3rem;">${a.content}</textarea>
        <input type="text" name="image" value="${a.image || ''}" style="width:100%;margin-bottom:0.3rem;">
        <button type="submit">Save</button>
        <button type="button" onclick="deleteArticle('${id}')">Delete</button>
        <button type="button" onclick="toggleFeature('${id}')">${a.featured?'Unfeature':'Feature'}</button>
      </form>
      <hr>
    `;
    grid.appendChild(div);
  });
}

async function saveArticle(e,id){
  e.preventDefault();
  const form = e.target;
  const articles = await getArticles();
  articles[id] = {
    title: form.title.value,
    author: form.author.value,
    date: form.date.value,
    issue: form.issue.value,
    content: form.content.value,
    image: form.image.value || '',
    featured: articles[id].featured || false
  };
  await saveArticles(articles);
  renderStaffArticles();
}

async function deleteArticle(id){
  if(confirm("Delete this article?")){
    const articles = await getArticles();
    delete articles[id];
    await saveArticles(articles);
    renderStaffArticles();
  }
}

async function toggleFeature(id){
  const articles = await getArticles();
  articles[id].featured = !articles[id].featured;
  await saveArticles(articles);
  renderStaffArticles();
}

// ================= ADD NEW ARTICLE =================
document.getElementById('new-article-form').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const form = e.target;
  const articles = await getArticles();
  const id = Date.now().toString();

  articles[id] = {
    title: form.title.value,
    author: form.author.value,
    date: form.date.value,
    issue: form.issue.value,
    content: form.content.value,
    image: form.image.value || '',
    featured: false
  };

  await saveArticles(articles);
  form.reset();
  renderStaffArticles();
});

// ================= INIT =================
async function renderStaffPortal(){
  await renderStaffList();
  await renderStaffArticles();
}

</script>
</body>
</html>
