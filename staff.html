<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MX Chronicles • Staff Portal</title>
<link rel="stylesheet" href="style.css">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBWjBUB1OjRXRghtMZ6ZMWQ1Kwk8aIjCoQ",
  authDomain: "mxchronicles-8e7b1.firebaseapp.com",
  databaseURL: "https://mxchronicles-8e7b1-default-rtdb.firebaseio.com",
  projectId: "mxchronicles-8e7b1",
  storageBucket: "mxchronicles-8e7b1.firebasestorage.app",
  messagingSenderId: "855683773579",
  appId: "1:855683773579:web:199aba0a59a5e09701908e"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const articlesRef = db.ref("articles");
const staffRef = db.ref("staff");
const currentIssueRef = db.ref("currentIssue");
</script>
</head>

<body>

<!-- PASSWORD OVERLAY -->
<div id="password-overlay" class="overlay">
  <div class="overlay-box">
    <h2>Staff Portal Access</h2>
    <input type="password" id="staff-password" placeholder="Enter Password">
    <button onclick="checkPassword()">Enter</button>
    <p id="password-error">Incorrect password</p>
  </div>
</div>

<div id="staff-portal" style="display:none;">

<header class="top-bar">
  <div class="masthead">MX CHRONICLES</div>
  <nav class="top-nav">
    <a href="index.html">HOME</a>
    <a href="articles.html">ARTICLES</a>
    <a href="about.html">ABOUT</a>
    <a href="staff.html" class="active">STAFF PORTAL</a>
  </nav>
</header>

<main class="container">

<!-- ISSUE SETTINGS -->
<section class="panel">
  <h2>Issue Settings</h2>
  <div class="row">
    <input type="number" id="issue-number-input" placeholder="Issue Number">
  </div>
  <div class="row">
    <input type="text" id="issue-title-input" placeholder="Issue Title">
  </div>
  <div class="row">
    <textarea id="issue-description-input" placeholder="Issue Description"></textarea>
  </div>
  <button onclick="saveIssueSettings()">Save Issue Settings</button>
</section>

<!-- STAFF MANAGEMENT -->
<section class="panel">
  <h2>Staff Members</h2>
  <div id="staff-list"></div>
  <div class="row">
    <input type="text" id="new-staff" placeholder="New staff name">
    <button onclick="addStaff()">Add</button>
  </div>
</section>

<!-- ADD NEW ARTICLE -->
<section class="panel">
  <h2>Add New Article</h2>
  <form id="new-article-form" class="form-grid">
    <input type="text" name="title" placeholder="Title" required>
    <input type="text" name="author" placeholder="Author" required>
    <input type="date" name="date" required>
    <input type="number" name="issue" placeholder="Issue Number" required>
    <input type="text" name="image" placeholder="Image URL">
    <textarea name="content" placeholder="Article content..." required></textarea>
    <button type="submit">Publish Article</button>
  </form>
</section>

<!-- MANAGE ARTICLES -->
<section class="panel">
  <h2>Manage Articles</h2>
  <div id="staff-articles" class="article-grid"></div>
</section>

</main>
</div>

<script>
// PASSWORD
function checkPassword(){
  const pw = document.getElementById("staff-password").value;
  if(pw === "26MXChronicles"){
    document.getElementById("password-overlay").style.display = "none";
    document.getElementById("staff-portal").style.display = "block";
  } else {
    document.getElementById("password-error").style.display = "block";
  }
}

// ISSUE SETTINGS
currentIssueRef.on("value", snapshot => {
  const data = snapshot.val() || {};
  document.getElementById("issue-number-input").value = data.number || "";
  document.getElementById("issue-title-input").value = data.title || "";
  document.getElementById("issue-description-input").value = data.description || "";
});

function saveIssueSettings() {
  const number = parseInt(document.getElementById("issue-number-input").value);
  const title = document.getElementById("issue-title-input").value.trim();
  const description = document.getElementById("issue-description-input").value.trim();
  currentIssueRef.set({number, title, description});
  alert("Issue settings saved!");
}

// STAFF MANAGEMENT
staffRef.on("value", snapshot=>{
  const data = snapshot.val() || [];
  const container = document.getElementById("staff-list");
  container.innerHTML = "";
  data.forEach((name,i)=>{
    const div = document.createElement("div");
    div.className = "list-item";
    div.innerHTML = `
      ${name} 
      <button onclick="removeStaff(${i})">Remove</button>
    `;
    container.appendChild(div);
  });
});

function addStaff(){
  const input = document.getElementById("new-staff");
  if(!input.value.trim()) return;
  staffRef.once("value").then(snapshot=>{
    let staff = snapshot.val() || [];
    staff.push(input.value.trim());
    staffRef.set(staff);
    input.value="";
  });
}

function removeStaff(index){
  staffRef.once("value").then(snapshot=>{
    let staff = snapshot.val() || [];
    staff.splice(index,1);
    staffRef.set(staff);
  });
}

// ADD NEW ARTICLE
document.getElementById("new-article-form").addEventListener("submit", function(e){
  e.preventDefault();
  const form = e.target;
  articlesRef.push({
    title: form.title.value,
    author: form.author.value,
    date: form.date.value,
    issue: parseInt(form.issue.value),
    content: form.content.value,
    image: form.image.value || "",
    featured:false
  });
  form.reset();
});

// MANAGE ARTICLES
articlesRef.on("value", snapshot=>{
  const data = snapshot.val();
  const container = document.getElementById("staff-articles");
  container.innerHTML="";
  if(!data){
    container.innerHTML="<p>No articles yet.</p>";
    return;
  }
  Object.entries(data).forEach(([id,a])=>{
    const card=document.createElement("div");
    card.className="article-card";
    card.innerHTML=`
      <h3>${a.title}</h3>
      <p>${a.author} • ${a.date} • Issue ${a.issue}</p>
      <button onclick="editArticle('${id}')">Edit</button>
      <button onclick="deleteArticle('${id}')">Delete</button>
      <button onclick="toggleFeature('${id}')">${a.featured?'Unfeature':'Feature'}</button>
    `;
    container.appendChild(card);
  });
});

function deleteArticle(id){
  articlesRef.child(id).remove();
}

function editArticle(id){
  const newContent = prompt("Edit content:");
  if(newContent){
    articlesRef.child(id).update({content:newContent});
  }
}

function toggleFeature(id){
  articlesRef.child(id).once("value").then(snap=>{
    const current = snap.val().featured || false;
    articlesRef.child(id).update({featured:!current});
  });
}
</script>

</body>
</html>
