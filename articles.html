<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Articles - MXChronicles</title>
<link rel="stylesheet" href="style.css">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBWjBUB1OjRXRghtMZ6ZMWQ1Kwk8aIjCoQ",
  authDomain: "mxchronicles-8e7b1.firebaseapp.com",
  databaseURL: "https://mxchronicles-8e7b1-default-rtdb.firebaseio.com",
  projectId: "mxchronicles-8e7b1",
  storageBucket: "mxchronicles-8e7b1.firebasestorage.app",
  messagingSenderId: "855683773579",
  appId: "1:855683773579:web:199aba0a59a5e09701908e"
};

<!-- ✅ FIX: prevent duplicate initialization -->
if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}

<!-- ✅ FIX: prevent db redeclaration crash -->
var db = firebase.database();
const articlesRef = db.ref("articles");
</script>
</head>

<body>

<header class="top-bar">
  <div class="masthead">MX CHRONICLES</div>
  <nav class="top-nav">
    <a href="index.html">HOME</a>
    <a href="articles.html" class="active">ARTICLES</a>
    <a href="about.html">ABOUT</a>
    <a href="staff.html">STAFF PORTAL</a>
  </nav>
</header>

<main id="articles-grid" class="articles-grid container"></main>

<script>
function renderArticlesPage(){
  const container = document.getElementById("articles-grid");

  articlesRef.once("value").then(snap=>{
    const data = snap.val();
    container.innerHTML = "";

    if(!data){
      container.innerHTML = "<p>No articles available.</p>";
      return;
    }

    Object.entries(data).forEach(([id, a])=>{
      const card = document.createElement("div");
      card.className = "article-card";

      card.onclick = ()=>{
        localStorage.setItem("currentArticle", id);
        window.location.href = "article.html";
      };

      card.innerHTML = `
        ${a.image ? `<img src="${a.image}" alt="${a.title}">` : ""}
        <h2>${a.title.toUpperCase()}</h2>
        <div class="meta">${a.author} · ${a.date} · Issue ${a.issue}</div>
        <p>${a.content.slice(0,160)}...</p>
      `;

      container.appendChild(card);
    });
  });
}

// Run
renderArticlesPage();
</script>

</body>
</html>
