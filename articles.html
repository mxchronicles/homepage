<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Articles - MXChronicles</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="top-bar">
    <div class="masthead">MXChronicles</div>
    <div class="top-nav">
      <a href="index.html">Home</a>
      <a href="articles.html">Articles</a>
      <a href="about.html">About</a>
      <a href="staff.html">Staff Portal</a>
    </div>
  </div>

  <div id="articles-grid"></div>

  <script>
    const articlesGrid = document.getElementById("articles-grid");
    let articles = JSON.parse(localStorage.getItem("articles")) || [];

    function renderArticles() {
      articlesGrid.innerHTML = "";
      articles.forEach(article => {
        const card = document.createElement("div");
        card.className = "article-card";
        card.innerHTML = `
          <h2>${article.title.toUpperCase()}</h2>
          <p class="meta">${article.author || ""} • ${article.date || ""}</p>
          <p>${article.synopsis || ""}</p>
          <a href="article.html?id=${article.id}">Read More</a>
        `;
        articlesGrid.appendChild(card);
      });
    }

    renderArticles();
  </script>
</body>
</html>
